<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Student List</title></head>
<body>
    <h1>Student List</h1>
    <a th:href="@{/students/register}">Register New Student</a>

    <p th:if="${students.empty}">No students registered yet.</p>

    <table th:unless="${students.empty}" border="1">
        <thead>
            <tr><th>Name</th><th>Email</th><th>Major</th></tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.major}"></td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}">Back to Home</a>
</body>
</html>
