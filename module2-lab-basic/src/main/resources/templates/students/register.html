<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Register Student</title></head>
<body>
    <h1>Register Student</h1>
    <form th:action="@{/students/register}" th:object="${student}" method="post">

        <div>
            <label>Name:</label>
            <input type="text" th:field="*{name}"/>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></span>
        </div>

        <div>
            <label>Email:</label>
            <input type="email" th:field="*{email}"/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></span>
        </div>

        <div>
            <label>Major:</label>
            <select th:field="*{major}">
                <option value="">Select a major</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Information Technology">Information Technology</option>
                <option value="Data Science">Data Science</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="Cybersecurity">Cybersecurity</option>
            </select>
            <span th:if="${#fields.hasErrors('major')}" th:errors="*{major}" style="color:red"></span>
        </div>

        <button type="submit">Register</button>
        <a th:href="@{/students/list}">Cancel</a>
    </form>
</body>
</html>
